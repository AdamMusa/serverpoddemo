# Name of your application. Used to uniquely configure containers.
service: serverpoddemo

# Name of the container image.
image: adammusa/serverpoddemo

# Deploy to these servers.
servers:
  web:
    hosts:
              - 5.78.46.167


# Branded error pages served by kamal-proxy (503 shows the maintenance message).
error_pages_path: .alkimist/error_pages

# SSH from the user's account container. Deploys must be non-interactive.
ssh:
  user: root
  keys_only: true
  keys:
    - /home/deployer/.ssh/id_rsa
  config: /home/deployer/.ssh/config

proxy:
  ssl: true
  hosts:
    - serverpod.alkimist.dev
  app_port: 8080
  healthcheck:
    path: /up


# Credentials for your image host.
registry:
  server: localhost:5555

env:
  secret:
    - POSTGRES_USER
    - POSTGRES_DB
    - POSTGRES_PASSWORD
    - REDIS_PASSWORD
  clear:
    PORT: 8080
    runmode: production
    serverid: default
    logging: normal
    role: monolith
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379


# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
aliases:
  shell: app exec --interactive --reuse "sh"
  logs: app logs


# Build on the project's own VPS: Alkimist orchestrates, your server builds.
# With registry.server localhost:5555, Kamal runs a transfer registry on the
# deploy container and SSH-forwards port 5555 to the VPS for push and pull.
builder:
  arch: amd64
  local: false
  remote: ssh://root@5.78.46.167

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  postgres:
    image: pgvector/pgvector:pg16
    service: postgres
    host: 5.78.46.167
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_USER
        - POSTGRES_DB
        - POSTGRES_PASSWORD
    directories:
      - serverpoddemo_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    service: redis
    host: 5.78.46.167
    port: "127.0.0.1:6379:6379"
    cmd: 'redis-server --requirepass "$REDIS_PASSWORD"'
    env:
      clear:
        REDIS_REPLICATION_MODE: master
      secret:
        - REDIS_PASSWORD
    directories:
      - serverpoddemo_redis_data:/data
