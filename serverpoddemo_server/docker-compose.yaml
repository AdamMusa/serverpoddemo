services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: serverpoddemo
      POSTGRES_PASSWORD: "fOpFcrctFYW69RjUBeisDslg0zCBKvaf"
    volumes:
      - serverpoddemo_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "PZX9uxBCBDVDNJrycrfXfdZsc9Ai2jjD"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: serverpoddemo_test
      POSTGRES_PASSWORD: "S88C0b9rjIOfgv-pYxfLrmGqrJvbreS5"
    volumes:
      - serverpoddemo_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "2ONet2V2hTtLuFeXCrmbTJ9oDsWcVTLM"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  serverpoddemo_data:
  serverpoddemo_test_data:
